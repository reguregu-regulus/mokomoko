<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0820">
<title>もこもこ☆シューター - 改良版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050310;
    font-family: 'M PLUS Rounded 1c', -apple-system, "Hiragino Maru Gothic ProN", sans-serif;
    touch-action: none;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,143,184,0.15), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(135,206,235,0.12), transparent 40%),
      #050310;
  }

  #gameContainer {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 480px;
    max-height: 100vh;
    aspect-ratio: 9 / 16;
    background:
      radial-gradient(ellipse at 50% 0%, #3a2360 0%, #1a0e35 40%, #0d0820 100%);
    overflow: hidden;
    box-shadow:
      0 0 80px rgba(167, 139, 250, 0.25),
      inset 0 0 60px rgba(255,143,184,0.05);
  }

  @media (min-aspect-ratio: 9/16) {
    #gameContainer { height: 100vh; width: auto; }
  }

  canvas#game {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

  /* ===== HUD ===== */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 14px 16px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
    color: #fff;
    gap: 10px;
  }

  .hud-card {
    background: rgba(13,8,32,0.7);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 7px 12px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    min-width: 78px;
    pointer-events: auto;
  }

  .hud-card.center {
    text-align: center;
    flex: 1;
    max-width: 110px;
    pointer-events: none;
  }

  .label {
    font-size: 9px;
    opacity: 0.65;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 1px;
  }

  .value {
    font-size: 18px;
    font-weight: 900;
    color: #FFE082;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }

  .value.danger { color: #FF8FB8; }
  .value.cool { color: #87CEEB; }

  /* CHAINアニメーション */
  .chain-active {
    animation: chainGlow 0.4s ease-in-out infinite alternate;
    display: inline-block;
  }

  @keyframes chainGlow {
    from {
      color: #FFE082;
      transform: scale(1);
      text-shadow: 0 0 8px rgba(255, 224, 130, 0.6);
    }
    to {
      color: #FF8FB8;
      transform: scale(1.2) rotate(3deg);
      text-shadow: 0 0 18px rgba(255, 143, 184, 1), 0 0 28px rgba(255, 224, 130, 0.6);
    }
  }

  .wave-bar {
    margin-top: 5px;
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
  }

  .wave-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #FF8FB8, #B19CD9);
    transition: width 0.3s ease;
    border-radius: 2px;
  }

  /* ===== Swap Button ===== */
  #swapBtn {
    position: absolute;
    bottom: 30px;
    right: 20px;
    width: 60px;
    height: 60px;
    background: rgba(177, 156, 217, 0.3);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    color: white;
    font-weight: 900;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(5px);
    z-index: 15;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  #swapBtn:active { transform: scale(0.9); background: rgba(177, 156, 217, 0.6); }

  /* ===== Combo popup ===== */
  #comboPopup {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    z-index: 15;
    font-family: 'DotGothic16', monospace;
    font-size: 32px;
    font-weight: 900;
    color: #FFE082;
    text-shadow:
      0 0 12px rgba(255,224,130,0.8),
      2px 2px 0 #B19CD9,
      4px 4px 0 #1a0e35;
    letter-spacing: 2px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    opacity: 0;
  }

  #comboPopup.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  /* ===== Overlays ===== */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at center, rgba(45,27,78,0.92) 0%, rgba(13,8,32,0.97) 70%);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 20;
    color: #fff;
    text-align: center;
    padding: 24px;
    pointer-events: auto;
  }

  .overlay.hidden { display: none; }

  .game-title {
    font-family: 'DotGothic16', 'M PLUS Rounded 1c', monospace;
    font-size: clamp(36px, 10vw, 56px);
    font-weight: 900;
    background: linear-gradient(135deg, #FFE082 0%, #FF8FB8 50%, #87CEEB 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1.1;
    letter-spacing: 3px;
    text-shadow: 0 0 30px rgba(255,143,184,0.4);
    animation: titleFloat 3s ease-in-out infinite;
    margin-bottom: 6px;
  }

  @keyframes titleFloat {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-10px) rotate(1deg); }
  }

  .start-btn {
    background: linear-gradient(135deg, #FF8FB8 0%, #B19CD9 100%);
    color: #fff;
    border: none;
    padding: 16px 44px;
    border-radius: 50px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 4px;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(255,143,184,0.45);
    transition: transform 0.15s ease;
  }
  .start-btn:active { transform: scale(0.96); }

  .instructions {
    margin-top: 32px;
    font-size: 12px;
    opacity: 0.55;
    line-height: 1.9;
  }
  .instructions strong { color: #FFE082; }

  /* Preview monsters for title */
  .preview-monsters { display: flex; gap: 8px; margin-bottom: 28px; }
  .preview-monsters span {
    width: 28px; height: 28px; border-radius: 50%;
    box-shadow: inset -3px -3px 0 rgba(0,0,0,0.15), inset 3px 3px 0 rgba(255,255,255,0.4);
    animation: bounce 1.5s ease-in-out infinite;
  }
  .preview-monsters span:nth-child(1) { background: #FF8FB8; animation-delay: 0s; }
  .preview-monsters span:nth-child(2) { background: #87CEEB; animation-delay: 0.1s; }
  .preview-monsters span:nth-child(3) { background: #FFE082; animation-delay: 0.2s; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hud-card">
      <div class="label">SCORE</div>
      <div class="value" id="scoreDisplay">0</div>
    </div>
    <div class="hud-card center">
      <div class="label">NEXT WAVE</div>
      <div class="value cool" id="waveDisplay">5</div>
      <div class="wave-bar"><div class="wave-bar-fill" id="waveFill" style="width:100%"></div></div>
    </div>
    <!-- ポーズボタン -->
    <div class="hud-card" id="pauseBtn" style="cursor: pointer;">
      <div class="label">CHAIN</div>
      <div class="value danger" id="chainDisplay">×1</div>
      <div style="font-size: 8px; opacity: 0.5; margin-top: 2px;">TAP TO PAUSE</div>
    </div>
  </div>

  <div id="swapBtn">SWAP</div>
  <div id="comboPopup"></div>

  <!-- タイトル画面 -->
  <div id="titleScreen" class="overlay">
    <div class="preview-monsters"><span></span><span></span><span></span></div>
    <div class="game-title">もこもこ<br>シューター</div>
    <button class="start-btn" id="startBtn">スタート</button>
    <div class="instructions">
      指をはなすと <strong>発射</strong><br>
      右下のボタンで <strong>色を交換</strong>
    </div>
  </div>

  <!-- ポーズ画面 -->
  <div id="pauseScreen" class="overlay hidden">
    <div class="game-title">PAUSED</div>
    <button class="start-btn" id="resumeBtn">再開する</button>
  </div>

  <!-- ゲームオーバー画面 -->
  <div id="gameOverScreen" class="overlay hidden">
    <div class="game-title">GAME OVER</div>
    <div class="value" id="finalScore" style="font-size: 48px; margin: 20px 0;">0</div>
    <button class="start-btn" id="retryBtn">もう一度</button>
  </div>
</div>

<script>
'use strict';

const GAME_W = 360;
const GAME_H = 640;
const BUBBLE_R = 20;
const COLS = 8;
const ROW_H = BUBBLE_R * Math.sqrt(3);
const TOP_OFFSET = 64;
const SHOOTER_Y = GAME_H - 56;
const PROJ_SPEED = 12;
const SHOTS_PER_WAVE_INITIAL = 5;

const COLORS = [
  { fill:'#FF8FB8', light:'#FFCDDD' },
  { fill:'#87CEEB', light:'#C8E8F5' },
  { fill:'#FFE082', light:'#FFF1B8' },
  { fill:'#B19CD9', light:'#D5C7EA' },
  { fill:'#A8E6CF', light:'#D0F0DF' },
];

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let bubbles = [], particles = [], fallingBubbles = [], scorePopups = [], popGhosts = [], shockwaves = [];
let projectile = null, nextColor = 0, queueColor = 0;
let aimX = 0, aimY = 0, isAiming = false, isPaused = false;
let score = 0, chain = 0, chainTimer = 0, waves = 0, state = 'title';
let shotsUntilNewRow = 5, globalDescentOffset = 0, descentRate = 0.01;

function resizeCanvas() {
  const container = document.getElementById('gameContainer');
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width * (window.devicePixelRatio || 1);
  canvas.height = rect.height * (window.devicePixelRatio || 1);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function initGame() {
  bubbles = []; particles = []; fallingBubbles = [];
  score = 0; chain = 0; waves = 0; globalDescentOffset = 0;
  shotsUntilNewRow = SHOTS_PER_WAVE_INITIAL;
  
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < (row % 2 === 1 ? COLS-1 : COLS); col++) {
      const pos = gridToXY(col, row);
      bubbles.push({ col, row, x: pos.x, y: pos.y, color: Math.floor(Math.random() * 5), scale: 1 });
    }
  }
  nextColor = Math.floor(Math.random() * 5);
  queueColor = Math.floor(Math.random() * 5);
  projectile = { x: GAME_W / 2, y: SHOOTER_Y, color: nextColor, flying: false };
  state = 'playing';
  updateHUD();
}

function gridToXY(col, row) {
  const offset = (row % 2 === 1) ? BUBBLE_R : 0;
  return { x: col * BUBBLE_R * 2 + BUBBLE_R + offset, y: row * ROW_H + BUBBLE_R + TOP_OFFSET };
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('waveDisplay').textContent = shotsUntilNewRow;
  document.getElementById('chainDisplay').textContent = '×' + Math.max(1, chain);
  document.getElementById('waveFill').style.width = (shotsUntilNewRow / SHOTS_PER_WAVE_INITIAL * 100) + '%';
  
  // CHAIN連動アニメーションのクラス付け替え
  const chainEl = document.getElementById('chainDisplay');
  if (chain > 0) chainEl.classList.add('chain-active');
  else chainEl.classList.remove('chain-active');
}

// ポーズ切り替え
function togglePause() {
  if (state !== 'playing') return;
  isPaused = !isPaused;
  document.getElementById('pauseScreen').classList.toggle('hidden', !isPaused);
}

// ボール交換
function swapBall() {
  if (isPaused || projectile.flying || state !== 'playing') return;
  const temp = projectile.color;
  projectile.color = queueColor;
  queueColor = temp;
}

document.getElementById('startBtn').onclick = () => { document.getElementById('titleScreen').classList.add('hidden'); initGame(); };
document.getElementById('pauseBtn').onclick = togglePause;
document.getElementById('resumeBtn').onclick = togglePause;
document.getElementById('swapBtn').onclick = swapBall;
document.getElementById('retryBtn').onclick = () => { document.getElementById('gameOverScreen').classList.add('hidden'); initGame(); };

// 入力処理
canvas.addEventListener('touchstart', (e) => {
  if (isPaused || state !== 'playing') return;
  isAiming = true;
}, {passive:false});

canvas.addEventListener('touchend', (e) => {
  if (!isAiming || isPaused || projectile.flying) return;
  isAiming = false;
  const rect = canvas.getBoundingClientRect();
  const touch = e.changedTouches[0];
  const tx = (touch.clientX - rect.left) / rect.width * GAME_W;
  const ty = (touch.clientY - rect.top) / rect.height * GAME_H;
  
  const dx = tx - projectile.x;
  const dy = ty - projectile.y;
  if (dy < -20) {
    const dist = Math.hypot(dx, dy);
    projectile.vx = (dx / dist) * PROJ_SPEED;
    projectile.vy = (dy / dist) * PROJ_SPEED;
    projectile.flying = true;
  }
});

function update() {
  if (isPaused || state !== 'playing') return;

  if (chainTimer > 0) {
    chainTimer--;
    if (chainTimer === 0) {
      chain = 0;
      updateHUD();
    }
  }

  if (projectile.flying) {
    projectile.x += projectile.vx;
    projectile.y += projectile.vy;
    if (projectile.x < BUBBLE_R || projectile.x > GAME_W - BUBBLE_R) projectile.vx *= -1;

    // 衝突判定
    let hit = false;
    for (const b of bubbles) {
      if (Math.hypot(projectile.x - b.x, projectile.y - b.y) < BUBBLE_R * 1.5) {
        hit = true; break;
      }
    }
    if (projectile.y < TOP_OFFSET + BUBBLE_R) hit = true;

    if (hit) {
      attachBubble();
    }
  }
}

function attachBubble() {
  const row = Math.round((projectile.y - TOP_OFFSET - BUBBLE_R) / ROW_H);
  const offset = (row % 2 === 1) ? BUBBLE_R : 0;
  const col = Math.max(0, Math.min(COLS-1, Math.round((projectile.x - BUBBLE_R - offset) / (BUBBLE_R * 2))));
  
  const pos = gridToXY(col, row);
  const newB = { col, row, x: pos.x, y: pos.y, color: projectile.color, scale: 1 };
  bubbles.push(newB);
  
  checkMatches(newB);
  
  projectile.flying = false;
  projectile.x = GAME_W / 2;
  projectile.y = SHOOTER_Y;
  projectile.color = queueColor;
  queueColor = Math.floor(Math.random() * 5);
  
  shotsUntilNewRow--;
  if (shotsUntilNewRow <= 0) {
    addNewRow();
    shotsUntilNewRow = SHOTS_PER_WAVE_INITIAL;
  }
  updateHUD();

  if (newB.y > SHOOTER_Y - 40) {
    state = 'gameover';
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOverScreen').classList.remove('hidden');
  }
}

function checkMatches(startB) {
  const match = [startB];
  const todo = [startB];
  const visited = new Set([startB.col + ',' + startB.row]);

  while(todo.length > 0) {
    const b = todo.pop();
    getNeighbors(b).forEach(n => {
      const nb = bubbles.find(x => x.col === n.c && x.row === n.r);
      if (nb && nb.color === startB.color && !visited.has(n.c + ',' + n.r)) {
        visited.add(n.c + ',' + n.r);
        match.push(nb);
        todo.push(nb);
      }
    });
  }

  if (match.length >= 3) {
    chain++;
    chainTimer = 120;
    score += match.length * 10 * chain;
    match.forEach(m => {
      bubbles = bubbles.filter(x => x !== m);
    });
    showCombo(match.length);
  } else {
    // コンボが途切れた場合はここでも管理可能ですが、
    // 今回は「連続で獲得したら」という条件なので attach時に計算。
  }
}

function getNeighbors(b) {
  const odd = b.row % 2 === 1;
  const res = [{c:b.col-1, r:b.row}, {c:b.col+1, r:b.row}, {c:b.col, r:b.row-1}, {c:b.col, r:b.row+1}];
  if (odd) {
    res.push({c:b.col+1, r:b.row-1}, {c:b.col+1, r:b.row+1});
  } else {
    res.push({c:b.col-1, r:b.row-1}, {c:b.col-1, r:b.row+1});
  }
  return res;
}

function addNewRow() {
  bubbles.forEach(b => { b.row++; const p = gridToXY(b.col, b.row); b.x = p.x; b.y = p.y; });
  for (let col = 0; col < COLS; col++) {
    const pos = gridToXY(col, 0);
    bubbles.push({ col, row: 0, x: pos.x, y: pos.y, color: Math.floor(Math.random() * 5), scale: 1 });
  }
}

function showCombo(n) {
  const p = document.getElementById('comboPopup');
  p.textContent = chain > 1 ? `${chain} CHAIN!!` : 'NICE!';
  p.classList.add('show');
  setTimeout(() => p.classList.remove('show'), 800);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const s = canvas.width / GAME_W;
  ctx.save();
  ctx.scale(s, s);

  // 背景のガイドライン
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.beginPath();
  ctx.moveTo(0, SHOOTER_Y - 30); ctx.lineTo(GAME_W, SHOOTER_Y - 30);
  ctx.stroke();

  // バブル描画
  bubbles.forEach(b => {
    drawBubble(b.x, b.y, b.color, 1);
  });

  // 発射体
  if (!projectile.flying) {
    // 次の弾のプレビュー
    drawBubble(GAME_W/2 + 40, SHOOTER_Y + 10, queueColor, 0.6);
  }
  drawBubble(projectile.x, projectile.y, projectile.color, 1);

  ctx.restore();
  update();
  requestAnimationFrame(draw);
}

function drawBubble(x, y, colorIdx, scale) {
  const c = COLORS[colorIdx];
  const r = BUBBLE_R * scale;
  
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = c.fill;
  ctx.fill();
  
  // 光沢
  ctx.beginPath();
  ctx.arc(x - r*0.3, y - r*0.3, r*0.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();
}

requestAnimationFrame(draw);
</script>
</body>
</html>
